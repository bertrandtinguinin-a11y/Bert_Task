name: Debug Build

on:
  push:
    branches: [ debug-build ]

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install
        working-directory: ./frontend
        run: npm install
      - name: Test build
        working-directory: ./frontend
        env:
          VITE_BASE_URL: /Bert_Task/
        run: |
          echo "=== START BUILD ==="
          npx vite build 2>&1 || true
          echo "=== VITE VERSION ==="
          npx vite --version
          echo "=== NODE VERSION ==="
          node --version
          echo "=== LS node_modules ==="
          ls node_modules/.bin/
