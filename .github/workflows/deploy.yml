name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: "pages"
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          cd frontend
          rm -f package-lock.json
          npm install --legacy-peer-deps

      - name: Build
        run: |
          cd frontend
          ls node_modules/.bin/
          VITE_BASE_URL=/Bert_Task/ node node_modules/.bin/vite build 2>&1

      - name: Copy 404.html for SPA routing
        working-directory: ./frontend/dist
        run: test -f index.html && cp index.html 404.html || echo "404 copy skipped"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
